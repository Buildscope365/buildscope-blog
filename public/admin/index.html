<!doctype html>
<html lang="zh-Hant-HK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>BuildScope CMS Admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <main
      id="buildscope-admin-root"
      style="min-height: 100vh; display: grid; place-items: center; background: #f3f5f8; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;"
    >
      <section style="display: grid; justify-items: center; gap: 2rem;">
        <img src="/favicon.svg" alt="BuildScope" style="width: min(42vw, 300px); height: auto;" />
        <p style="color: #526173; margin: 0;">Loading BuildScope CMS...</p>
      </section>
    </main>

    <script>
      (function () {
        var siteUrl = "https://buildscope-blog.netlify.app";
        var callbackTokens = ["confirmation_token", "invite_token", "recovery_token"];
        var hasCallbackToken = /(confirmation_token|invite_token|recovery_token)=/.test(window.location.hash || "");
        var root = document.getElementById("buildscope-admin-root");
        var cmsLoaded = false;

        window.BUILDSCOPE_NETLIFY_SITE_URL = siteUrl;

        function hasTokenInHash() {
          return callbackTokens.some(function (token) {
            return (window.location.hash || "").indexOf(token + "=") !== -1;
          });
        }

        function showError(message) {
          root.innerHTML = [
            '<section style="max-width: 42rem; padding: 2rem; line-height: 1.6; color: #17212b;">',
            "<h1>Unable to load BuildScope CMS login</h1>",
            "<p>",
            message,
            "</p>",
            '<p><a href="/" style="color: #7a86a1;">Go back to site</a></p>',
            "</section>",
          ].join("");
        }

        function openIdentityLogin() {
          if (!window.netlifyIdentity || !window.netlifyIdentity.open) {
            showError(
              "Netlify Identity widget is not ready. Please refresh the page, or check whether identity.netlify.com is blocked by the browser/network.",
            );
            return;
          }

          window.netlifyIdentity.open();
        }

        window.BUILDSCOPE_ADMIN_OPEN_LOGIN = openIdentityLogin;

        function renderLoginGate() {
          root.innerHTML = [
            '<section style="display: grid; justify-items: center; gap: 2rem;">',
            '<img src="/favicon.svg" alt="BuildScope" style="width: min(42vw, 300px); height: auto;" />',
            '<button id="buildscope-admin-login" type="button" style="border: 0; border-radius: 4px; background: #2f4147; color: white; padding: 0.7rem 1rem; box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18); cursor: pointer; font: inherit;">Login with Netlify Identity</button>',
            '<a href="/" style="color: #7a86a1; text-decoration: none;">← Go back to site</a>',
            "</section>",
          ].join("");

          document.getElementById("buildscope-admin-login").addEventListener("click", openIdentityLogin);
        }

        function loadDecapCMS() {
          if (cmsLoaded) {
            return;
          }

          cmsLoaded = true;

          if (root && root.parentNode) {
            root.parentNode.removeChild(root);
          }

          var cmsScript = document.createElement("script");
          cmsScript.src = "https://unpkg.com/decap-cms@^3.8.0/dist/decap-cms.js";
          cmsScript.onerror = function () {
            document.body.innerHTML =
              '<main style="font-family: system-ui, sans-serif; margin: 2rem; max-width: 42rem;"><h1>Unable to load Decap CMS</h1><p>Please refresh the page. If the issue continues, check the Decap CMS CDN connection.</p></main>';
          };
          document.body.appendChild(cmsScript);
        }

        function initIdentity() {
          if (!window.netlifyIdentity) {
            showError(
              "Netlify Identity widget did not load. Please refresh the page, or check whether identity.netlify.com is blocked by the browser/network.",
            );
            return;
          }

          if (window.__buildscopeIdentityInitialized) {
            return;
          }

          window.__buildscopeIdentityInitialized = true;

          window.netlifyIdentity.on("init", function (user) {
            if (hasCallbackToken) {
              window.netlifyIdentity.open();
              return;
            }

            if (user) {
              loadDecapCMS();
            } else {
              renderLoginGate();
            }
          });

          window.netlifyIdentity.on("login", function () {
            window.netlifyIdentity.close();
            loadDecapCMS();
          });

          window.netlifyIdentity.on("signup", function () {
            if (!hasTokenInHash()) {
              window.netlifyIdentity.close();
              loadDecapCMS();
            }
          });

          window.netlifyIdentity.on("recovery", function () {
            window.netlifyIdentity.close();
            loadDecapCMS();
          });

          window.netlifyIdentity.on("error", function (error) {
            console.error("Netlify Identity error:", error);
          });

          window.netlifyIdentity.init({
            APIUrl: siteUrl + "/.netlify/identity",
          });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initIdentity);
        } else {
          initIdentity();
        }
      })();
    </script>
  </body>
</html>
