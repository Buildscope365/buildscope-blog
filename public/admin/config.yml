backend:
  name: git-gateway
  branch: main

site_url: "https://buildscope-blog.netlify.app"
display_url: "https://buildscope-blog.netlify.app"

logo_url: "/favicon.svg"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: simple
show_preview_links: true

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "blog"
    label: "Blog posts"
    label_singular: "Blog post"
    folder: "src/content/blog"
    create: true
    delete: true
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{slug}}"
    preview_path: "blog/{{slug}}/"
    summary: "{{date}} - {{title}}"
    sortable_fields:
      - "date"
      - "title"
      - "author"
      - "category"
    view_groups:
      - label: "Category"
        field: "category"
      - label: "Difficulty"
        field: "difficulty"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Short SEO description for listing pages and social previews."

      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "QS 白話文", value: "quantity-surveying" }
          - { label: "合約與 Claim", value: "contract-management" }
          - { label: "NEC 合約", value: "nec" }
          - { label: "SOP Ordinance", value: "sop" }
          - { label: "RFI / TQ", value: "rfi-tq" }
          - { label: "EOT / LAD", value: "eot-lad" }
          - { label: "VO / Payment Claim", value: "vo-payment" }
          - { label: "地盤管理", value: "site-management" }
          - { label: "工程技術", value: "construction-technology" }
          - { label: "AI 工程工具", value: "ai-tools" }
          - { label: "工程案例", value: "case-studies" }
          - { label: "Project Management", value: "project-management" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        allow_add: true
        collapsed: false
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      - label: "Cover image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Uploaded images are stored in public/images/uploads."

      - label: "Author"
        name: "author"
        widget: "string"
        default: "BuildScope 編輯部"

      - label: "Difficulty"
        name: "difficulty"
        widget: "select"
        default: "入門"
        options:
          - "入門"
          - "中階"
          - "進階"

      - label: "Reading time"
        name: "readingTime"
        widget: "string"
        required: false
        default: "5 分鐘"

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        required: false
        default: false

      - label: "Draft"
        name: "draft"
        widget: "boolean"
        required: false
        default: false

      - label: "Hero accent"
        name: "heroAccent"
        widget: "select"
        required: false
        default: "orange"
        options:
          - { label: "Orange", value: "orange" }
          - { label: "Red", value: "red" }
          - { label: "Blue", value: "blue" }

      - label: "Body"
        name: "body"
        widget: "markdown"
